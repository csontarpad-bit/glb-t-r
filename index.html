<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Quarantine City Mobile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
</head>
<body>
    
<div id="fade-overlay" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out;"></div>

<!-- ÚJ: TÖLTŐKÉPERNYŐ -->
    <div id="loading-screen">
        <div class="loading-content">
            <h2 class="loading-text">RENDSZER INICIALIZÁLÁSA...</h2>
            <!-- Radioaktív kémcső (Töltőcsík) -->
            <div class="radioactive-tube">
                <div id="radioactive-liquid"></div>
            </div>
            <p id="loading-status">Kapcsolat felépítése...</p>
            
            <!-- ÚJ: Belépés Gomb (Kezdetben rejtve van) -->
            <button id="loading-continue-btn" class="cyber-btn hidden" style="margin-top: 25px; font-size: 20px; padding: 10px 25px;">BELÉPÉS A RENDSZERBE</button>
        </div>
    </div>

    <!-- ÚJ: ÉLŐ 3D FŐMENÜ -->
    <div id="main-menu" class="hidden">
        <div class="menu-box">
            <h1>QUARANTINE<br><span class="highlight">CITY</span></h1>
            <p id="high-score-display">KORÁBBI EGYENLEG: 0 CR</p>
            
            <div class="menu-options">
                <label>FENYEGETÉSI SZINT:</label>
                <select id="difficulty-select" class="cyber-select">
                    <option value="easy">1. FOKOZAT (Könnyű)</option>
                    <option value="medium" selected>2. FOKOZAT (Normál)</option>
                    <option value="hard">3. FOKOZAT (Nehéz)</option>
                </select>
            </div>
            
            <button id="start-game-btn" class="cyber-btn">BEVETÉS INDÍTÁSA</button>
        </div>
    </div>

<!-- ÚJ: SCI-FI TERMINÁL KINÉZET -->
    <div id="shop-menu" class="hidden">
        <div id="terminal-screen">
            <div class="terminal-header">TERMINÁL [AKTÍV]</div>
            <div class="terminal-sub">EGYENLEG: <span id="shop-points">0</span> CR</div>
            
            <div class="shop-tabs">
                <button id="tab-weapons" class="tab-btn active">FEGYVEREK</button>
                <button id="tab-skills" class="tab-btn">FEJLESZTÉSEK</button>
            </div>

            <div id="shop-weapons" class="shop-tab-content">
                <div class="shop-grid">
                    <button id="buy-pistol" class="shop-btn"></button>
                    <button id="buy-shotgun" class="shop-btn"></button>
                    <button id="buy-rifle" class="shop-btn"></button>
                    <button id="buy-super" class="shop-btn"></button>
                    <button id="buy-ammo" class="shop-btn" style="grid-column: span 2;"></button>
                </div>
            </div>

            <div id="shop-skills" class="shop-tab-content hidden">
                <div class="shop-grid">
                    <button id="skill-revive" class="shop-btn"></button>
                    <button id="skill-health" class="shop-btn"></button>
                    <button id="skill-speed" class="shop-btn"></button>
                    <button id="skill-ammoLoot" class="shop-btn"></button>
                    <button id="skill-healthLoot" class="shop-btn"></button>
                    <button id="skill-freeze" class="shop-btn"></button>
                </div>
            </div>

            <button id="close-shop-btn">KAPCSOLAT BONTÁSA</button>
        </div>
    </div>

    <!-- JÁTÉK UI -->
    <div id="game-ui-wrapper" class="hidden">
        <div id="damage-flash"></div>
        <div id="heal-flash"></div>
        <div id="ammo-flash"></div>
        <div id="screen-blood" style="opacity: 0;"></div>
        <div id="ice-overlay" style="opacity: 0;"></div> <!-- ÚJ JÉG EFFEKT -->

        <div id="ui-layer">
            <div id="radar"><div class="radar-center"></div><div class="radar-scanner"></div></div>
            
            <div id="health-bar-container">
                <div id="health-fill"></div>
                <div id="armor-fill" style="width: 0%;"></div> 
            </div>
            <div id="score-display">PÉNZ: 0</div>
            <div id="crosshair"><div class="crosshair-center"></div></div>
            
            <div id="hitmarker" class="hidden"></div>
            <div id="headshot-msg" class="hidden">FEJLÖVÉS! 💀</div>
            
            <button id="freeze-btn" class="hidden">❄️ FAGYASZTÁS</button> <!-- ÚJ GOMB -->
            <button id="switch-weapon-btn">🔄 VÁLTÁS</button>
            <div id="weapon-info-display">Pisztoly</div>
            <div id="ammo-display">[ 10 / 30 ]</div>
            
            <button id="shoot-btn">💥</button>
            
            <div id="zone-left"></div>
            <div id="zone-right"></div>
            <div id="joy-base" class="hidden"><div id="joy-stick"></div></div>
        </div>

        <div id="wave-display" class="hidden">1. HULLÁM</div>
        <div id="reload-text" class="hidden">ÚJRATÖLTÉS...</div>
    </div>

    <div id="game-over" class="hidden">
        <h1>MEGHALTÁL</h1>
        <p id="final-score">PONT: 0</p>
        <p id="final-wave">TÚLÉLT HULLÁMOK: 0</p>
        <button id="restart-btn">VISSZA A MENÜBE</button>
    </div>

    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
